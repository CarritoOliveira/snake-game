<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Cobrinha 🐍</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f0f0f, #1a3c1a);
            color: #0f0;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        header {
            width: 100%;
            max-width: 600px;
            text-align: center;
            padding: 20px 0;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 4px solid #0f0;
            box-shadow: 0 0 20px #0f0;
        }

        .logo {
            font-size: 2.8rem;
            margin: 0;
            text-shadow: 
                0 0 10px #0f0,
                0 0 20px #0f0,
                4px 4px 0 #000,
                -4px -4px 0 #000;
            letter-spacing: 4px;
        }

        .banner {
            margin: 15px 0;
            font-size: 1.1rem;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
        }

        .game-container {
            margin-top: 20px;
            background: #000;
            padding: 15px;
            border: 6px solid #0f0;
            box-shadow: 0 0 30px #0f0;
            position: relative;
        }

        canvas {
            background: #111;
            image-rendering: pixelated;
            border: 3px solid #0f0;
        }

        .info {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 1rem;
            color: #0f0;
        }

        .controls {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
            line-height: 1.5;
            max-width: 600px;
        }

        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1rem;
            margin: 10px;
            cursor: pointer;
            box-shadow: 0 0 15px #0f0;
        }

        button:hover {
            background: #fff;
            transform: scale(1.05);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border: 4px solid #f00;
            text-align: center;
            display: none;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 40px #f00;
        }
    </style>
</head>
<body>
    <header>
        <h1 class="logo">🐍 JOGO DA COBRINHA 🐍</h1>
        <div class="banner">Clássico Retrô - Coma as maçãs!</div>
    </header>

    <div class="game-container">
        <canvas id="gameCanvas" width="600" height="480"></canvas>
        
        <!-- Tela de Game Over -->
        <div id="gameOverScreen" class="game-over">
            <h2 style="color: #f00; margin: 0 0 20px 0;">GAME OVER</h2>
            <p id="finalScore" style="margin: 10px 0; color: #0f0;"></p>
            <button onclick="restartGame()">JOGAR NOVAMENTE</button>
        </div>
    </div>

    <div class="info">
        <div>Pontuação: <span id="score">0</span></div>
        <div>Recorde: <span id="highScore">0</span></div>
    </div>

    <div class="controls">
        <p>Use as <strong>setas do teclado</strong> para mover</p>
        <p><strong>Espaço</strong> - Pausar / Continuar</p>
        <button onclick="togglePause()">Pausar / Continuar</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("highScore");
        const gameOverScreen = document.getElementById("gameOverScreen");
        const finalScoreElement = document.getElementById("finalScore");

        // Configurações do jogo
        const gridSize = 20;
        const cols = canvas.width / gridSize;
        const rows = canvas.height / gridSize;
        
        let snake = [
            {x: 10, y: 10}
        ];
        let food = {};
        let dx = 1;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        let gameInterval;
        let gameSpeed = 100; // milissegundos
        let gameRunning = true;
        let paused = false;

        highScoreElement.textContent = highScore;

        function randomFood() {
            food = {
                x: Math.floor(Math.random() * cols),
                y: Math.floor(Math.random() * rows)
            };
            
            // Evita spawnar comida em cima da cobra
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    return randomFood();
                }
            }
        }

        function draw() {
            // Limpa o canvas
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Desenha a cobra
            for (let i = 0; i < snake.length; i++) {
                if (i === 0) {
                    // Cabeça da cobra (verde mais claro)
                    ctx.fillStyle = "#4ade80";
                } else {
                    ctx.fillStyle = "#22c55e";
                }
                ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize, gridSize);
                
                // Borda da cobra
                ctx.strokeStyle = "#14532d";
                ctx.lineWidth = 2;
                ctx.strokeRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize, gridSize);
            }
            
            // Desenha a comida (maçã)
            ctx.fillStyle = "#ef4444";
            ctx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4);
            
            // Brilho na maçã
            ctx.fillStyle = "rgba(255,255,255,0.6)";
            ctx.fillRect(food.x * gridSize + 5, food.y * gridSize + 5, 6, 6);
        }

        function move() {
            if (!gameRunning || paused) return;
            
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            // Colisão com paredes
            if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
                gameOver();
                return;
            }
            
            // Colisão com o próprio corpo
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            // Comeu a comida?
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                randomFood();
                
                // Aumenta velocidade a cada 50 pontos
                if (score % 50 === 0 && gameSpeed > 50) {
                    gameSpeed -= 10;
                    clearInterval(gameInterval);
                    gameInterval = setInterval(gameLoop, gameSpeed);
                }
            } else {
                snake.pop();
            }
            
            draw();
        }

        function gameLoop() {
            move();
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(gameInterval);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("snakeHighScore", highScore);
                highScoreElement.textContent = highScore;
            }
            
            finalScoreElement.textContent = `Sua pontuação: ${score}`;
            gameOverScreen.style.display = "flex";
        }

        function restartGame() {
            snake = [{x: 10, y: 10}];
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.textContent = "0";
            gameSpeed = 100;
            gameRunning = true;
            paused = false;
            gameOverScreen.style.display = "none";
            randomFood();
            draw();
            clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, gameSpeed);
        }

        function togglePause() {
            if (!gameRunning) return;
            paused = !paused;
        }

        // Controles do teclado
        document.addEventListener("keydown", (e) => {
            if (!gameRunning) return;
            
            switch (e.key) {
                case "ArrowUp":
                    if (dy !== 1) { // Evita virar para trás
                        dx = 0;
                        dy = -1;
                    }
                    break;
                case "ArrowDown":
                    if (dy !== -1) {
                        dx = 0;
                        dy = 1;
                    }
                    break;
                case "ArrowLeft":
                    if (dx !== 1) {
                        dx = -1;
                        dy = 0;
                    }
                    break;
                case "ArrowRight":
                    if (dx !== -1) {
                        dx = 1;
                        dy = 0;
                    }
                    break;
                case " ":
                    e.preventDefault();
                    togglePause();
                    break;
            }
        });

        // Inicialização
        function init() {
            randomFood();
            draw();
            gameInterval = setInterval(gameLoop, gameSpeed);
        }

        // Inicia o jogo
        window.onload = init;
    </script>
</body>
</html>
